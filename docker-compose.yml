  #RAbbitMQ service
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    healthcheck:
      test: "rabbitmqctl node_health_check"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_USER: user
      RABBITMQ_PASS: 123456
    networks:
      - app-network
  # postgres Service
  postgres:
    container_name: postgres
    image: postgres:17
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobs
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/:/docker-entrypoint-initdb.d/
    ports:
      - "5433:5432"
    networks:
      - app-network
volumes:
  postgres_data:
networks:
  app-network:
    external: true # Make the network available to other Docker Compose files
